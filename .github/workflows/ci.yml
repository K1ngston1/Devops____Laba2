name: CI

on:
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true

      - run: uv sync --frozen --dev

      - run: uv run ruff check . --output-format=github

      - run: uv run mypy .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true

      - run: uv sync --frozen --dev

      - run: uv run pytest -q --maxfail=1 --disable-warnings

  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: shundor/bandit-action@v1
        with: 
          path: "app"
          level: high
          confidence: high
