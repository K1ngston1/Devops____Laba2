name: CD (Docker -> GHCR -> DO Deploy)

on:
  push:
    branches:
      - main
      - prod

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/k1ngston1/hmp-server   # ТУТ ВАЖЛИВО - маленька k

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      image_ref: ${{ steps.meta.outputs.image_ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set tag based on branch
        id: meta
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            TAG="dev"
          elif [ "${GITHUB_REF_NAME}" = "prod" ]; then
            TAG="prod"
          else
            echo "Unsupported branch ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_NAME}:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (target=prod)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          target: prod
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max