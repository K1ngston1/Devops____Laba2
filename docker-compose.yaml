services:
  api:
    build:
      context: .
      target: dev
    container_name: hmp-api
    env_file: .env
    environment:
      JWT_SECRET: 4jez3Ruh5sbVMChP
      JWT_ALGORITHM: HS256
      JWT_LIFETIME_SEC: 90000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_USER: default
      REDIS_PASSWORD: password
      REDIS_DB: 0
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: hmp-postgres
      # For dbmate migrations
      DATABASE_URL: postgres://user:password@postgres:5432/hmp-postgres?sslmode=disable
    ports:
      - "8000:8000"
    volumes:
      - ./app:/code/app
      - ./db:/code/db
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
      redis:
        condition: service_started

  postgres:
    image: postgres:latest
    container_name: hmp-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: hmp-postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s

  redis:
    image: redis:latest
    container_name: hmp-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: password

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hmp-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - postgres
    restart: unless-stopped
    logging:
      driver: none

volumes:
  redis_data:
